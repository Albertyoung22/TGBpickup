<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📜 學生接送歷史紀錄 | 智慧校園管理系統</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0ea5e9;
            --primary-dark: #0284c7;
            --accent: #6366f1;
            --bg: #f8fafc;
            --card-bg: rgba(255, 255, 255, 0.9);
            --text: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', 'Microsoft JhengHei', sans-serif;
            background: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(14, 165, 233, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(99, 102, 241, 0.1) 0px, transparent 50%);
            color: var(--text);
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
            padding: 1.5rem 2.5rem;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        }

        .header-title h1 {
            font-size: 1.75rem;
            font-weight: 700;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-title p {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }

        .nav-buttons {
            display: flex;
            gap: 1rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            font-weight: 600;
            font-size: 0.95rem;
            text-decoration: none;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            border: none;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 6px -1px rgba(14, 165, 233, 0.3);
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(14, 165, 233, 0.3);
        }

        .btn-secondary {
            background: white;
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: #f1f5f9;
            transform: translateY(-1px);
        }

        /* Stats Section */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 1.25rem;
            border: 1px solid var(--border);
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 0.25rem;
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Filter Section */
        .filter-bar {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .search-container {
            flex: 1;
            min-width: 300px;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 1rem 1.5rem 1rem 3.5rem;
            border-radius: 1rem;
            border: 1px solid var(--border);
            background: var(--card-bg);
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
            backdrop-filter: blur(10px);
        }

        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.1);
        }

        .search-icon {
            position: absolute;
            left: 1.25rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1.25rem;
        }

        /* Table Section */
        .table-container {
            background: var(--card-bg);
            border-radius: 1.5rem;
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
            backdrop-filter: blur(10px);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        thead {
            background: #f8fafc;
            border-bottom: 1px solid var(--border);
        }

        th {
            padding: 1.25rem 1.5rem;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        td {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid #f1f5f9;
            font-size: 0.95rem;
            transition: background 0.2s;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: rgba(14, 165, 233, 0.03);
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.1rem;
            margin-right: 1rem;
        }

        .parent-info {
            display: flex;
            align-items: center;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 0.35rem 0.85rem;
            border-radius: 2rem;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.025em;
        }

        .type-arrived { background: #fef2f2; color: #ef4444; border: 1px solid #fee2e2; }
        .type-soon { background: #fffbeb; color: #f59e0b; border: 1px solid #fef3c7; }
        .type-thanks { background: #f0fdf4; color: #10b981; border: 1px solid #dcfce7; }

        .time-cell {
            font-weight: 600;
            color: var(--text-muted);
        }

        .date-cell {
            font-weight: 700;
            color: var(--primary);
        }

        .speech-text {
            color: var(--text-muted);
            font-size: 0.85rem;
            max-width: 300px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .empty-state {
            padding: 6rem;
            text-align: center;
            color: var(--text-muted);
        }

        .empty-state h3 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: var(--text);
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #log-body tr {
            animation: fadeIn 0.4s ease forwards;
        }

        @media (max-width: 768px) {
            body { padding: 1rem; }
            header { flex-direction: column; text-align: center; gap: 1.5rem; padding: 1.5rem; }
            .nav-buttons { width: 100%; }
            .btn { flex: 1; justify-content: center; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
            th:nth-child(5), td:nth-child(5) { display: none; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-title">
                <h1>📜 接送明細紀錄表</h1>
                <p>呈現最近 7 天的完整接送廣播與動作狀態紀錄</p>
            </div>
            <div class="nav-buttons">
                <button class="btn btn-secondary" onclick="exportCSV()">📥 匯出報表</button>
                <a href="dashboard" class="btn btn-primary">⬅ 回監控中心</a>
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div id="stat-total" class="stat-value">0</div>
                <div class="stat-label">今日累計接送</div>
            </div>
            <div class="stat-card">
                <div id="stat-arrived" class="stat-value">0</div>
                <div class="stat-label">今日已到達</div>
            </div>
            <div class="stat-card">
                <div id="stat-peak" class="stat-value">--:--</div>
                <div class="stat-label">今日高峰時段</div>
            </div>
            <div class="stat-card">
                <div id="stat-parents" class="stat-value">0</div>
                <div class="stat-label">活躍家長人數</div>
            </div>
        </div>

        <div class="filter-bar">
            <div class="search-container">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" class="search-input" placeholder="搜尋姓名、班級、狀態或日期內容...">
            </div>
            <select id="filterType" class="search-input" style="flex: 0 0 180px; padding-left: 1.5rem;">
                <option value="all">所有的狀態</option>
                <option value="已到達校門">已到達校門</option>
                <option value="即將到達">即將到達</option>
                <option value="已接到孩子">已接到孩子</option>
            </select>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>🗓 日期</th>
                        <th>🕙 時間</th>
                        <th>👨‍👩‍👧 家長身分</th>
                        <th>🏷 狀態</th>
                        <th>📢 廣播詳細內容</th>
                    </tr>
                </thead>
                <tbody id="log-body">
                    <tr>
                        <td colspan="5" class="empty-state">
                            <h3>⏳ 正在載入紀錄...</h3>
                            <p>正在從雲端資料庫同步接送紀錄資訊</p>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let allLogs = [];

        async function fetchLogs() {
            try {
                const res = await fetch('/pickup/api/history');
                const data = await res.json();
                allLogs = data.reverse(); // 最新在前
                updateStats(allLogs);
                renderLogs(allLogs);
            } catch (err) {
                console.error(err);
                document.getElementById('log-body').innerHTML = `<tr><td colspan="5" class="empty-state"><h3>❌ 載入失敗</h3><p>${err.message}</p></td></tr>`;
            }
        }

        function updateStats(logs) {
            const today = new Date().toISOString().split('T')[0];
            const todayLogs = logs.filter(l => l.date === today);
            
            document.getElementById('stat-total').innerText = todayLogs.length;
            document.getElementById('stat-arrived').innerText = todayLogs.filter(l => l.status === '已到達校門').length;
            
            const uniqueParents = new Set(logs.map(l => l.name));
            document.getElementById('stat-parents').innerText = uniqueParents.size;

            // Simple peak hour (by hour)
            if (todayLogs.length > 0) {
                const hours = todayLogs.map(l => l.time.split(':')[0]);
                const counts = hours.reduce((acc, h) => { acc[h] = (acc[h] || 0) + 1; return acc; }, {});
                let peakHour = Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b);
                document.getElementById('stat-peak').innerText = `${peakHour}:00 - ${parseInt(peakHour)+1}:00`;
            }
        }

        function renderLogs(logs) {
            const body = document.getElementById('log-body');
            if (logs.length === 0) {
                body.innerHTML = '<tr><td colspan="5" class="empty-state"><h3>🍃 尚無紀錄</h3><p>目前系統中沒有符合條件的接送紀錄</p></td></tr>';
                return;
            }

            body.innerHTML = logs.map((log, index) => `
                <tr style="animation-delay: ${index * 0.05}s">
                    <td class="date-cell">${log.date || '-'}</td>
                    <td class="time-cell">${log.time}</td>
                    <td>
                        <div class="parent-info">
                            <div class="avatar">${(log.name || '家').substring(0, 1)}</div>
                            <span style="font-weight:700; color: #1e293b;">${log.name}</span>
                        </div>
                    </td>
                    <td><span class="badge ${log.class || ''}">${log.status}</span></td>
                    <td class="speech-text" title="${log.speech_text}">${log.speech_text}</td>
                </tr>
            `).join('');
        }

        function filterData() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const type = document.getElementById('filterType').value;

            const filtered = allLogs.filter(log => {
                const matchTerm = Object.values(log).some(v => String(v).toLowerCase().includes(term));
                const matchType = type === 'all' || log.status === type;
                return matchTerm && matchType;
            });

            renderLogs(filtered);
        }

        function exportCSV() {
            if (allLogs.length === 0) return alert("沒有資料可供匯出");
            let csvContent = "data:text/csv;charset=utf-8,\uFEFF";
            csvContent += "日期,時間,姓名,狀態,詳細內容\n";
            allLogs.forEach(log => {
                csvContent += `${log.date},${log.time},${log.name},${log.status},"${log.speech_text}"\n`;
            });
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `接送紀錄_${new Date().toLocaleDateString()}.csv`);
            document.body.appendChild(link);
            link.click();
        }

        document.getElementById('searchInput').addEventListener('input', filterData);
        document.getElementById('filterType').addEventListener('change', filterData);

        // Initial fetch
        fetchLogs();
    </script>
</body>
</html>
