<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📢 校園接送即時看板</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;900&display=swap" rel="stylesheet">
    <link rel="icon" href="/static/app_icon.png" type="image/png">
    <style>
        :root {
            --bg: #f8fafc;
            --text: #0f172a;
            --primary: #0284c7;
            --danger: #ef4444;
            --warning: #f59e0b;
            --success: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Outfit', 'Microsoft JhengHei', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at top right, #e0f2fe 0%, #f8fafc 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* 頂部標題與時間 (Glassmorphism) */
        header {
            padding: 20px 5%;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.9);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.04);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .title {
            font-size: clamp(1.4rem, 4vw, 2.5rem);
            font-weight: 900;
            background: linear-gradient(135deg, #0369a1, #0ea5e9);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .clock {
            font-size: clamp(1.4rem, 5vw, 3rem);
            font-weight: 900;
            color: var(--primary);
            font-variant-numeric: tabular-nums;
            text-shadow: 0 2px 15px rgba(2, 132, 199, 0.15);
        }

        /* 主內容區 */
        .billboard-container {
            flex: 1;
            padding: 20px 5%;
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow-y: auto;
        }

        /* 單筆廣播卡片 */
        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            border-left: 12px solid #cbd5e1;
            animation: slideIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            position: relative;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .row:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px -5px rgba(0, 0, 0, 0.08);
        }

        @keyframes slideIn {
            from {
                transform: translateX(-30px);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* 顏色主題 */
        .row.type-arrived {
            border-left-color: var(--danger);
            background: linear-gradient(90deg, #fff1f2 0%, rgba(255, 255, 255, 0.95) 100%);
        }

        .row.type-soon {
            border-left-color: var(--warning);
            background: linear-gradient(90deg, #fffbeb 0%, rgba(255, 255, 255, 0.95) 100%);
        }

        .row.type-thanks {
            border-left-color: var(--success);
            background: linear-gradient(90deg, #f0fdf4 0%, rgba(255, 255, 255, 0.95) 100%);
        }

        .student-info {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .student-name {
            font-size: clamp(1.6rem, 5vw, 3.5rem);
            font-weight: 900;
            color: #1e293b;
        }

        .status-badge {
            font-size: clamp(1rem, 3vw, 2rem);
            padding: 8px 24px;
            border-radius: 14px;
            font-weight: 900;
            letter-spacing: 1.5px;
            white-space: nowrap;
        }

        .row.type-arrived .status-badge {
            color: #fff;
            background: var(--danger);
            box-shadow: 0 8px 15px -3px rgba(239, 68, 68, 0.3);
        }

        .row.type-soon .status-badge {
            color: #fff;
            background: var(--warning);
            box-shadow: 0 8px 15px -3px rgba(245, 158, 11, 0.3);
        }

        .row.type-thanks .status-badge {
            color: #fff;
            background: var(--success);
            box-shadow: 0 8px 15px -3px rgba(16, 185, 129, 0.3);
        }

        .arrival-time {
            font-size: clamp(1.2rem, 3.5vw, 2.2rem);
            font-weight: 700;
            color: #94a3b8;
            font-variant-numeric: tabular-nums;
            white-space: nowrap;
        }

        /* 最新的特別突顯 */
        .row:first-child {
            z-index: 10;
            border-width: 16px;
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.12);
            transform: scale(1.01);
        }

        .row:first-child.type-arrived {
            animation: slideIn 0.5s ease forwards, glowRed 2s infinite ease-in-out;
        }

        @keyframes glowRed {
            0% {
                box-shadow: 0 0 15px rgba(239, 68, 68, 0.15);
            }

            50% {
                box-shadow: 0 0 40px rgba(239, 68, 68, 0.4);
            }

            100% {
                box-shadow: 0 0 15px rgba(239, 68, 68, 0.15);
            }
        }

        .no-data {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: clamp(1.3rem, 4vw, 2.5rem);
            color: #94a3b8;
            font-weight: 700;
            gap: 15px;
            text-align: center;
            opacity: 0.8;
        }

        /* 🔊 語音按鈕 - Responsive */
        .play-gesture-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 10000;
            padding: 16px 28px;
            font-size: clamp(1.1rem, 2.5vw, 1.5rem);
            font-family: 'Outfit', 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, #0ea5e9, #10b981);
            color: white;
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(14, 165, 233, 0.4);
            font-weight: 900;
            cursor: pointer;
            animation: bounceBtn 2s infinite;
            transition: transform 0.2s, background 0.2s;
        }

        .play-gesture-btn:active {
            transform: scale(0.95);
        }

        @keyframes bounceBtn {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-8px);
            }
        }

        /* RWD 手機版特化設定 */
        @media (max-width: 640px) {
            header {
                padding: 15px 20px;
            }

            .billboard-container {
                padding: 15px 20px;
            }

            .row {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
                padding: 20px;
                border-left-width: 8px;
                border-radius: 16px;
            }

            .student-info {
                gap: 12px;
                flex-direction: column;
                align-items: flex-start;
                width: 100%;
            }

            .arrival-time {
                align-self: flex-end;
                font-size: 1.1rem;
                margin-top: -15px;
                color: #64748b;
            }

            .row:first-child {
                border-width: 10px;
                transform: scale(1);
            }

            .play-gesture-btn {
                bottom: 25px;
                right: 25px;
                padding: 14px 24px;
                border-radius: 16px;
            }
        }
    </style>
</head>

<body>
    <header>
        <div class="title">CAMPUS PICKUP LIVE</div>
        <div id="clock" class="clock">00:00:00</div>
    </header>

    <div id="billboard" class="billboard-container">
        <div class="no-data">🍃 靜候放學廣播中...</div>
    </div>

    <!-- 🏗️ Relay Control Panel -->
    <div class="relay-panel">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <div class="relay-title">🎛️ 設備控制 (本機硬體)</div>
            <div id="serial-status-container" style="display: flex; align-items: center; gap: 10px;">
                <span id="web-serial-status" style="font-size: 0.85rem; color: #64748b;">狀態：未連接</span>
                <button id="btn-serial-connect" class="serial-btn" onclick="connectWebSerial()">🔌 連接繼電器</button>
                <button id="btn-serial-disconnect" class="serial-btn"
                    style="display:none; background:#fee2e2; color:#b91c1c;"
                    onclick="disconnectWebSerial()">斷開連結</button>
            </div>
        </div>
        <div class="relay-grid">
            <div id="relay-item-1" class="relay-item" onclick="toggleRelay(1)">
                <div class="relay-icon">📣</div>
                <div class="relay-label">1號 (廣播)</div>
                <div class="relay-toggle" id="relay-status-1">狀態：<span style='color: #94a3b8;'>●</span> 關閉</div>
            </div>
            <div id="relay-item-2" class="relay-item" onclick="toggleRelay(2)">
                <div class="relay-icon">💡</div>
                <div class="relay-label">2號 (門燈)</div>
                <div class="relay-toggle" id="relay-status-2">狀態：<span style='color: #94a3b8;'>●</span> 關閉</div>
            </div>
            <div id="relay-item-3" class="relay-item" onclick="toggleRelay(3)">
                <div class="relay-icon">🌬️</div>
                <div class="relay-label">3號 (風扇)</div>
                <div class="relay-toggle" id="relay-status-3">狀態：<span style='color: #94a3b8;'>●</span> 關閉</div>
            </div>
            <div id="relay-item-4" class="relay-item" onclick="toggleRelay(4)">
                <div class="relay-icon">🚪</div>
                <div class="relay-label">4號 (電門)</div>
                <div class="relay-toggle" id="relay-status-4">狀態：<span style='color: #94a3b8;'>●</span> 關閉</div>
            </div>
        </div>
        <div class="relay-all-off" onclick="allRelayOff()">一鍵關閉所有設備</div>
    </div>

    <style>
        .relay-panel {
            padding: 20px 5%;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.8);
            margin-top: auto;
        }

        .relay-title {
            font-size: 1.2rem;
            font-weight: 900;
            margin-bottom: 15px;
            color: #475569;
        }

        .relay-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
        }

        .relay-item {
            background: white;
            padding: 15px;
            border-radius: 18px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }

        .relay-item:active {
            transform: scale(0.95);
            background: #f1f5f9;
        }

        .relay-icon {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .relay-label {
            font-size: 0.9rem;
            font-weight: 700;
            color: #1e293b;
        }

        .relay-toggle {
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 4px;
        }

        .relay-all-off {
            margin-top: 15px;
            text-align: center;
            padding: 12px;
            background: #ffe4e6;
            color: #be123c;
            border-radius: 12px;
            font-weight: 900;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .serial-btn {
            padding: 5px 12px;
            font-size: 0.8rem;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            background: #f8fafc;
            cursor: pointer;
            font-weight: 600;
        }

        .relay-item.online {
            border-color: #0ea5e9;
            background: #f0f9ff;
        }
    </style>

    <script>
        let lastHistoryHash = "";
        let textQueue = [];
        let isSpeaking = false;
        let audioUnlocked = false;
        let audioPlayer = document.createElement("audio"); // 隱藏播放器

        function showGestureBtn() {
            if (audioUnlocked || document.getElementById('play-gesture-btn')) return;
            const btn = document.createElement('button');
            btn.id = 'play-gesture-btn';
            btn.className = 'play-gesture-btn';
            btn.textContent = "🔊 點擊解鎖背景語音";
            btn.onclick = () => {
                // Play silent audio to unlock AudioContext
                audioPlayer.src = "data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=";
                audioPlayer.play().catch(e => console.warn(e));
                audioUnlocked = true;
                btn.remove();
                speakNext();
            };
            document.body.appendChild(btn);
        }

        async function speakNext() {
            if (isSpeaking || textQueue.length === 0 || !audioUnlocked) return;
            isSpeaking = true;

            const text = textQueue.shift();

            try {
                // 向後端請求 Edge TTS 音源
                const res = await fetch("/api/tts_preview", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ text: text })
                });

                if (!res.ok) throw new Error("TTS Request Failed");

                const blob = await res.blob();
                const url = URL.createObjectURL(blob);

                audioPlayer.src = url;
                audioPlayer.onended = () => {
                    URL.revokeObjectURL(url);
                    isSpeaking = false;
                    setTimeout(speakNext, 100);
                };
                audioPlayer.onerror = () => {
                    isSpeaking = false;
                    setTimeout(speakNext, 100);
                };
                await audioPlayer.play();
            } catch (err) {
                console.error("Speech error", err);
                isSpeaking = false;
                setTimeout(speakNext, 100);
            }
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('zh-TW', { hour12: false });
        }
        setInterval(updateClock, 1000);
        let _serialPort = null;
        let _serialWriter = null;
        let relayStates = { 1: false, 2: false, 3: false, 4: false };

        updateClock();

        async function connectWebSerial() {
            if (!navigator.serial) {
                alert("瀏覽器不支援 Web Serial API，請使用 Chrome 或 Edge。");
                return;
            }
            try {
                _serialPort = await navigator.serial.requestPort();
                await _serialPort.open({ baudRate: 9600 });
                _serialWriter = _serialPort.writable.getWriter();
                document.getElementById('web-serial-status').textContent = "狀態：🟢 已連接硬體";
                document.getElementById('btn-serial-connect').style.display = "none";
                document.getElementById('btn-serial-disconnect').style.display = "block";
            } catch (e) {
                console.error("Serial connect error:", e);
                alert("連接失敗: " + e.message);
            }
        }

        async function disconnectWebSerial() {
            try {
                if (_serialWriter) {
                    _serialWriter.releaseLock();
                    _serialWriter = null;
                }
                if (_serialPort) {
                    await _serialPort.close();
                    _serialPort = null;
                }
            } catch (e) { console.warn(e); }
            document.getElementById('web-serial-status').textContent = "狀態：未連接";
            document.getElementById('btn-serial-connect').style.display = "block";
            document.getElementById('btn-serial-disconnect').style.display = "none";
        }

        async function sendWebRelayCommand(ch, on) {
            if (!_serialWriter) return false;
            const bytes = new Uint8Array([0xA0, ch, on ? 1 : 0, (0xA0 + ch + (on ? 1 : 0)) & 0xFF]);
            try {
                await _serialWriter.write(bytes);
                return true;
            } catch (e) {
                console.error("Serial write error:", e);
                disconnectWebSerial();
                return false;
            }
        }

        function toggleRelay(ch) {
            const newState = !relayStates[ch];
            sendRelay(ch, newState);
        }

        async function poll() {
            try {
                const res = await fetch('/api/poll');
                const data = await res.json();
                const currentHash = JSON.stringify(data.history);
                if (currentHash === lastHistoryHash) return;

                // Diff and push text to queue
                if (lastHistoryHash !== "") {
                    const oldObj = JSON.parse(lastHistoryHash);
                    const oldKeys = new Set(oldObj.map(x => x.name + x.time));
                    const newItems = data.history.filter(x => !oldKeys.has(x.name + x.time)).reverse();

                    for (let item of newItems) {
                        if (item.speech_text) {
                            textQueue.push(item.speech_text);
                        }
                        // 🌟 Auto Trigger Relay 1 on "Arrived"
                        if (item.class === "type-arrived") {
                            console.log("🚀 [自動聯動] 偵測到已到達，啟動 1 號繼電器 (擴大機)");
                            sendRelay(1, true);
                        }
                    }
                    if (textQueue.length > 0 && !audioUnlocked) {
                        showGestureBtn();
                    } else if (textQueue.length > 0 && audioUnlocked) {
                        speakNext();
                    }
                }

                lastHistoryHash = currentHash;
                updateBillboard(data.history);
            } catch (err) { console.error("Poll error:", err); }
        }

        function updateBillboard(history) {
            const container = document.getElementById('billboard');
            if (!history || history.length === 0) {
                container.innerHTML = '<div class="no-data">🍃 目前無接送資訊</div>';
                return;
            }

            container.innerHTML = history.slice(0, 5).map(item => `
                <div class="row ${item.class || ''}">
                    <div class="student-info">
                        <div class="student-name">${item.name}</div>
                        <div class="status-badge">${item.status}</div>
                    </div>
                    <div class="arrival-time">${item.time}</div>
                </div>
            `).join('');
        }

        async function sendRelay(ch, on) {
            // 1. Priority: Local Web Serial
            if (_serialWriter) {
                const ok = await sendWebRelayCommand(ch, on);
                if (ok) {
                    relayStates[ch] = on;
                    provideVisualFeedback(ch, on);
                    return;
                }
            }

            // 2. Fallback: Cloud API
            try {
                const res = await fetch("/api/relay/send", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ ch: ch, on: on })
                });
                if (res.ok) {
                    relayStates[ch] = on;
                    provideVisualFeedback(ch, on);
                }
            } catch (e) { console.error("Relay error:", e); }
        }

        function provideVisualFeedback(ch, on) {
            const items = document.querySelectorAll('.relay-item');
            const target = items[ch - 1];
            const statusText = document.getElementById(`relay-status-${ch}`);
            if (target) {
                if (on) {
                    target.classList.add('online');
                    if (statusText) statusText.innerHTML = "狀態：<span style='color: #10b981;'>●</span> 開啟";
                } else {
                    target.classList.remove('online');
                    if (statusText) statusText.innerHTML = "狀態：<span style='color: #94a3b8;'>●</span> 關閉";
                }

            }
        }


        async function allRelayOff() {
            if (!confirm("確定要關閉所有設備？")) return;
            for (let i = 1; i <= 4; i++) {
                await sendRelay(i, false);
            }
        }

        async function pollRelayStatus() {
            try {
                const res = await fetch('/api/relay/status');
                if (res.ok) {
                    const states = await res.json();
                    for (let ch in states) {
                        const is_on = states[ch];
                        if (relayStates[ch] !== is_on) {
                            relayStates[ch] = is_on;
                            provideVisualFeedback(Number(ch), is_on);
                        }
                    }
                }
            } catch (e) { console.error("Relay poll error:", e); }
        }

        // 🌟 核心橋樑：讓網頁去抓雲端指令並轉發給 USB 電路板
        async function pollCloudCommands() {
                if (!_serialWriter) return; // 沒連接硬體就不用抓
                try {
                    const res = await fetch('/api/relay/get');
                    if (res.ok) {
                        const cmds = await res.json();
                        for (let c of cmds) {
                            console.log("☁️ [收到雲端指令]", c);
                            const ok = await sendWebRelayCommand(c.ch, c.on);
                            if (ok) {
                                relayStates[c.ch] = c.on;
                                provideVisualFeedback(c.ch, c.on);
                            }
                        }
                    }
                } catch (e) { console.error("Cloud command fetch error:", e); }
            }

        async function autoConnectSerial() {
            if (!navigator.serial) return;
            try {
                const ports = await navigator.serial.getPorts();
                if (ports.length > 0) {
                    _serialPort = ports[0];
                    await _serialPort.open({ baudRate: 9600 });
                    _serialWriter = _serialPort.writable.getWriter();
                    document.getElementById('web-serial-status').textContent = "狀態：🟢 已自動連接";
                    document.getElementById('btn-serial-connect').style.display = "none";
                    document.getElementById('btn-serial-disconnect').style.display = "block";
                    console.log("🚀 [自動連線] 看板已恢復連線至電路板");
                }
            } catch (e) { console.warn("看板自動連線失敗:", e); }
        }

        setInterval(poll, 2500);
        setInterval(pollRelayStatus, 3000);
        setInterval(pollCloudCommands, 2000); // 每一點五秒抓一次，提高反應速到
        poll();
        pollRelayStatus();
        autoConnectSerial(); // 啟動自動連線
    </script>

</body>

</html>
